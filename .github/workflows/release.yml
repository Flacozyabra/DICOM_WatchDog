name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pillow PyQt5 PyQt6 pyinstaller

    - name: Build PyQt6 executable
      shell: bash
      run: python build_PyQt6.py

    - name: Build PyQt5 executable
      shell: bash
      run: python build_PyQt5.py

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
