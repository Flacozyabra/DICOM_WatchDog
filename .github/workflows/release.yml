name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Job 1: Modern build (Python 3.11) — PyQt6 + PyQt5 ──────────────────────
  build-modern:
    name: Build Modern (Python 3.11)
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pillow PyQt5 PyQt6 pyinstaller

      - name: Build PyQt6 executable
        shell: bash
        run: python build_PyQt6.py

      - name: Build PyQt5 executable
        shell: bash
        run: python build_PyQt5.py

      - name: Upload modern build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-modern
          path: dist/*.exe
          retention-days: 1

  # ── Job 2: Legacy build (PyQt5) — Windows 7 / 8 / 10 compatible ───────────
  build-legacy:
    name: Build Legacy (PyQt5 / Windows 7)
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pillow PyQt5 pyinstaller

      - name: Build PyQt5 Legacy executable
        shell: bash
        run: python build_PyQt5_Legacy.py

      - name: Upload legacy build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-legacy
          path: dist/*.exe
          retention-days: 1

  # ── Job 3: Publish — collect all EXEs and create GitHub Release ─────────────
  release:
    name: Publish GitHub Release
    needs: [build-modern, build-legacy]
    runs-on: ubuntu-latest

    steps:
      - name: Download modern build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-modern
          path: dist/

      - name: Download legacy build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-legacy
          path: dist/

      - name: List artifacts
        run: ls -lh dist/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
